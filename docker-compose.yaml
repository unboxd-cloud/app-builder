services:
  bolt:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache git && git clone --depth=1 --recurse-submodules https://github.com/stackblitz/bolt.new /app && cd /app && npm install -g pnpm && pnpm install -r && pnpm run build:web && pnpm run dev:web"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped