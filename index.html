<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Builder - No-Code Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .draggable { cursor: move; }
    .drop-zone { min-height: 200px; border: 2px dashed #cbd5e1; }
    .drop-zone.dragover { border-color: #6366f1; background: #eef2ff; }
  </style>
</head>
<body class="bg-gray-100">
  <nav class="bg-indigo-600 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fas fa-magic mr-2"></i>App Builder</h1>
      <div class="space-x-4">
        <button class="bg-white text-indigo-600 px-3 py-1 rounded text-sm">Preview</button>
        <button class="bg-green-500 text-white px-3 py-1 rounded text-sm">Deploy</button>
      </div>
    </div>
  </nav>
  
  <div class="container mx-auto p-4 flex gap-4">
    <div class="w-64 bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold mb-3">Components</h3>
      <div class="space-y-2">
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Button</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Input</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Card</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Table</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Chart</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Form</div>
        <div class="draggable bg-gray-100 p-2 rounded" draggable="true">Modal</div>
      </div>
    </div>
    
    <div class="flex-1 bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold mb-3">Canvas</h3>
      <div class="drop-zone p-4 rounded" id="canvas">
        <p class="text-gray-400 text-center">Drag components here</p>
      </div>
    </div>
    
    <div class="w-64 bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold mb-3">Properties</h3>
      <div class="space-y-3">
        <div>
          <label class="block text-sm text-gray-600">Label</label>
          <input type="text" class="w-full border rounded p-1" value="Submit">
        </div>
        <div>
          <label class="block text-sm text-gray-600">Style</label>
          <select class="w-full border rounded p-1">
            <option>Primary</option>
            <option>Secondary</option>
            <option>Outline</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-600">Action</label>
          <select class="w-full border rounded p-1">
            <option>None</option>
            <option>Submit Form</option>
            <option>Navigate</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
